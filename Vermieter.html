<section class="section" id="formular">
<div class="container">

<h2>Wohnung einreichen</h2>

<p class="sub">
Einfach starten – wir melden uns innerhalb von 24–48 Stunden.
</p>

<div class="card">

<form action="https://formspree.io/f/mbdanavy" method="POST" enctype="multipart/form-data">

<input type="hidden" name="lead_type" value="VERMIETER_WOHNUNG">

<label>Name *</label>
<input type="text" name="name" required style="width:100%;padding:10px;margin-bottom:12px">

<label>E-Mail *</label>
<input type="email" name="email" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Telefon</label>
<input type="tel" name="telefon" style="width:100%;padding:10px;margin-bottom:12px">

<label>Adresse der Wohnung *</label>
<input type="text" name="adresse" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Anzahl Zimmer *</label>
<input type="text" name="zimmer" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Wohnungsgrösse (m²)</label>
<input type="number" name="qm" min="0" step="1" placeholder="z.B. 72" style="width:100%;padding:10px;margin-bottom:12px">

<label>Monatsmiete (CHF) *</label>
<input type="number" name="miete" min="0" step="1" placeholder="z.B. 2200" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Maximale Anzahl Personen</label>
<input type="number" name="max_personen" min="1" step="1" placeholder="z.B. 2" style="width:100%;padding:10px;margin-bottom:12px">

<label>Gewünschtes Haushaltseinkommen (CHF/Monat)</label>
<input type="number" name="income_min" min="0" step="1" placeholder="z.B. 6500" style="width:100%;padding:10px;margin-bottom:12px">

<label>Einzugsdatum</label>
<input type="date" name="einzugsdatum" style="width:100%;padding:10px;margin-bottom:12px">

<label>Haustiere erlaubt?</label>
<select name="haustiere" style="width:100%;padding:10px;margin-bottom:12px">
<option value="">Bitte wählen</option>
<option value="ja">Ja</option>
<option value="nein">Nein</option>
</select>

<label>Virtuelle Tour (Matterport / Video Link)</label>
<input type="url" name="tour_link" placeholder="https://..." style="width:100%;padding:10px;margin-bottom:12px">

<label>Fotos der Wohnung</label>
<input type="file" name="fotos" accept="image/*" multiple style="width:100%;padding:10px;margin-bottom:12px">

<label>Weitere Informationen</label>
<textarea name="nachricht" rows="5" style="width:100%;padding:10px;margin-bottom:14px"></textarea>

<div style="margin:10px 0 14px;font-size:14px;color:#666;">
<label style="display:flex;gap:10px;align-items:flex-start;">
<input type="checkbox" name="datenschutz" required style="margin-top:4px;">
<span>
Ich bestätige, dass meine Angaben zur Bearbeitung meiner Anfrage und zur Vermittlung geeigneter Mietinteressenten verwendet werden dürfen.
Weitere Informationen in der <a href="datenschutz.html" target="_blank" rel="noopener">Datenschutzerklärung</a>.
</span>
</label>
</div>

<button class="btn" type="submit">
Wohnung senden
</button>

</form>

<div class="small" style="margin-top:10px;color:var(--muted);">
Kontakt: <a href="mailto:info@mietmatch-zuerich.ch">info@mietmatch-zuerich.ch</a>
</div>

</div>

</div>
</section>
