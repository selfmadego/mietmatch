<section class="section" id="profil">

<div class="container">

<h2>Profil kostenlos erstellen</h2>

<p class="sub">
Sende uns dein Profil – wir melden uns bei passenden Wohnungen.
</p>

<div class="card" style="margin-top:14px">

<form action="https://formspree.io/f/mbdanavy" method="POST" enctype="multipart/form-data">

<label>Name *</label>
<input type="text" name="name" required style="width:100%;padding:10px;margin-bottom:12px">

<label>E-Mail *</label>
<input type="email" name="email" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Telefon</label>
<input type="tel" name="telefon" style="width:100%;padding:10px;margin-bottom:12px">

<label>Monatliches Einkommen (CHF) *</label>
<input type="number" name="einkommen" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Einzugsdatum *</label>
<input type="date" name="einzugsdatum" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Haushaltsgrösse *</label>
<input type="number" name="haushalt" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Gewünschte Region *</label>
<input type="text" name="region" placeholder="z.B. Zürich, Winterthur, Uster" required style="width:100%;padding:10px;margin-bottom:12px">

<label>Betreibungsauszug (Pflicht) *</label>
<input 
type="file"
name="betreibungsauszug"
accept=".pdf,.jpg,.jpeg,.png"
required
style="width:100%;padding:10px;margin-bottom:12px">

<p style="font-size:14px;color:#666;margin-top:-6px;margin-bottom:16px">
Bitte lade deinen aktuellen Betreibungsauszug hoch. Ohne dieses Dokument kann das Profil nicht eingereicht werden.
</p>

<label>Weitere Informationen</label>
<textarea name="nachricht" rows="5" style="width:100%;padding:10px;margin-bottom:14px"></textarea>

<button class="btn" type="submit">
Profil senden
</button>

</form>

</div>

</div>

</section>
