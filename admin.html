<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>MietMatch Admin</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
background:#2b6df6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

select{
padding:10px;
font-size:16px;
margin-right:10px;
}

pre{
background:#111;
color:#0f0;
padding:20px;
border-radius:8px;
overflow:auto;
}

</style>

</head>

<body>

<div class="box">

<h2>MietMatch Admin</h2>

<p>Wohnung auswählen:</p>

<select id="wohnung">
<option value="W001">W001</option>
</select>

<button onclick="check()">Matching starten</button>

<br><br>

<pre id="result">Noch kein Ergebnis</pre>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzBPFAqUgj5m6aK__dl_Dqm4OMgXDlBQfczAh0-pTVG0Ra27RVnpf3PMPUIFXD8uVhl/exec";

async function check(){

let w=document.getElementById("wohnung").value;

let r=await fetch(API+"?wohnung="+w);

let data=await r.json();

document.getElementById("result").textContent=
JSON.stringify(data,null,2);

}

</script>

</body>
</html>
